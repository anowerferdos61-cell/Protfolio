<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Anower Ferdos</title>
<link rel="stylesheet" href="style.css">
<style>
    .contact-container {
        max-width:600px;
        margin:120px auto;
        padding:40px;
        background: linear-gradient(135deg, #1e293b 0%, #2d3e5f 100%);
        border-radius:15px;
        box-shadow: 0 20px 50px rgba(56, 189, 248, 0.2);
        animation: fadeInUp 0.8s ease;
        border-left:5px solid #38bdf8;
        text-align:center;
    }

    .contact-container h2 {
        color:#38bdf8;
        margin-bottom:30px;
        font-size:36px;
    }

    .contact-info {
        margin-bottom:25px;
    }

    .contact-info p {
        color:#cbd5e1;
        font-size:16px;
        margin:10px 0;
    }

    .contact-info strong {
        color:#38bdf8;
        font-weight:600;
    }

    .social-links {
        display:flex;
        justify-content:center;
        flex-wrap:wrap;
        gap:15px;
        margin-top:40px;
    }

    .social-links a {
        display:flex;
        align-items:center;
        justify-content:center;
        width:50px;
        height:50px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color:#0f172a;
        text-decoration:none;
        border-radius:50%;
        font-weight:600;
        transition:0.3s;
        box-shadow: 0 5px 15px rgba(56, 189, 248, 0.2);
    }

    .social-links a:hover {
        transform:scale(1.15) rotate(5deg);
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
    }

    .link-btn {
        display:inline-block;
        margin:10px 15px;
        padding:12px 25px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color:#0f172a;
        text-decoration:none;
        border-radius:8px;
        font-weight:600;
        transition:0.3s;
        border:2px solid #38bdf8;
    }

    .link-btn:hover {
        transform:translateY(-5px);
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
    }

    .contact-form {
        margin-top:40px;
        text-align:left;
    }

    .form-group {
        margin-bottom:20px;
    }

    .form-group label {
        display:block;
        color:#38bdf8;
        margin-bottom:8px;
        font-weight:600;
    }

    .form-group input,
    .form-group textarea {
        width:100%;
        padding:12px;
        background:#0f172a;
        border:2px solid #38bdf8;
        border-radius:8px;
        color:#e2e8f0;
        font-family:inherit;
        transition:0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline:none;
        border-color:#0ea5e9;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }

    .form-group textarea {
        resize:vertical;
        min-height:100px;
    }

    .submit-btn {
        width:100%;
        padding:12px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color:#0f172a;
        border:none;
        border-radius:8px;
        font-weight:600;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .submit-btn:hover {
        transform:translateY(-3px);
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">Anower</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- CONTACT SECTION -->
<div class="contact-container">
    <h2>📞 Get In Touch</h2>

    <div class="contact-info">
        <p><strong>Email:</strong> anowerferdos61@gmail.com</p>
        <p><strong>Phone:</strong> 01303446161</p>
        <p style="margin-top:30px; color:#94a3b8;">
            Feel free to reach out for collaborations or just a friendly hello!
        </p>
    </div>

    <!-- Social Links -->
    <div style="margin-top:30px;">
        <p style="color:#cbd5e1; margin-bottom:20px;">Connect with me on:</p>
        <div class="social-links">
            <a href="https://github.com/anowerferdos61-cell" target="_blank" title="GitHub">GH</a>
            <a href="https://www.linkedin.com/in/anower-ferdos-70a7a82ab/" target="_blank" title="LinkedIn">IN</a>
            <a href="https://www.instagram.com/anower_ferdos/" target="_blank" title="Instagram">IG</a>
        </div>
    </div>

    <!-- Direct Links -->
    <div style="margin-top:30px;">
        <a href="https://github.com/anowerferdos61-cell" target="_blank" class="link-btn">🔗 GitHub Profile</a>
        <a href="https://www.linkedin.com/in/anower-ferdos-70a7a82ab/" target="_blank" class="link-btn">🔗 LinkedIn</a>
        <a href="https://www.instagram.com/anower_ferdos/" target="_blank" class="link-btn">🔗 Instagram</a>
    </div>

    <!-- Contact Form -->
    <form class="contact-form" onsubmit="handleSubmit(event)">
        <h3 style="color:#38bdf8; margin-bottom:20px;">Or Send Me a Message</h3>
        
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>

<script>
function handleSubmit(event) {
    event.preventDefault();
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;
    
    // Construct mailto link
    const mailtoLink = `mailto:anowerferdos61@gmail.com?subject=Message from ${encodeURIComponent(name)}&body=${encodeURIComponent(message + '\n\nFrom: ' + email)}`;
    
    // Open mail client
    window.location.href = mailtoLink;
    
    // Show alert
    alert('Opening your mail client...');
}
</script>

</body>
</html>
